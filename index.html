<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forum</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eee;
      margin: 0;
    }

    #container {
      width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
    }

    .post {
      border: 1px solid #ccc;
      margin: 10px 0;
      padding: 10px;
      background: #fafafa;
    }

    .reply {
      margin-left: 40px;
      border-left: 2px solid #ccc;
      padding-left: 10px;
    }

    blockquote {
      color: green;
      margin: 5px 0;
    }

    textarea {
      width: 100%;
      height: 60px;
    }

    button {
      margin-top: 5px;
    }

    #boardBar button {
      margin-right: 5px;
    }
  </style>
</head>

<body>

<div id="container">

  <div id="boardBar">
    <button onclick="switchBoard('Movies & Shows')">Entertainment</button>
    <button onclick="switchBoard('Tech')">Tech</button>
    <button onclick="switchBoard('Gaming')">Gaming</button>
    <button onclick="switchBoard('General')">Random</button>
  </div>

  <h2 id="boardTitle">No Board</h2>

  <textarea id="postInput"></textarea>
  <button onclick="addPost()">Post</button>

  <div id="posts"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
