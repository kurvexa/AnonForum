<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anon Forum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="boardBar">
    [ <button onclick="switchBoard('general')">general</button> / 
    <button onclick="switchBoard('tech')">tech</button> / 
    <button onclick="switchBoard('gaming')">gaming</button> / 
    <button onclick="switchBoard('random')">random</button> ]
</div>

<div id="container">
    <h1 id="boardTitle">General</h1>
    <hr>

<div id="postFormContainer">
    <table class="postForm">
        <tr>
            <td class="formLabel">Comment</td>
            <td>
                <textarea id="postInput" placeholder="Start a new topic..."></textarea>
            </td>
        </tr>
        <tr>
            <td class="formLabel">Submit</td>
            <td>
                <button onclick="addPost()">Post New Topic</button>
                <span style="font-size: 8pt; color: #555;"> Hey pal, don't say anything too bad! </span>
            </td>
        </tr>
    </table>
</div>

    <hr>
    <div id="posts"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>
</body>
</html>
